<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RescueRoad - Login & Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            transform: translateY(0);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .auth-card:hover {
            font-size: 1.2rem;
        }

        /* Subtle nudge */

        .auth-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .auth-tab {
            padding-bottom: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dim);
            transition: 0.3s;
            position: relative;
        }

        .auth-tab.active {
            color: var(--primary);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <header class="glass-header">
        <nav class="container">
            <a href="index.html" class="logo">Rescue<span>Road</span></a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">Login</div>
                <div class="auth-tab" id="tab-register">Register</div>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div class="auth-footer">
                <p id="auth-switch-text">Want to work with us? <a href="provider_auth.html"
                        style="color: var(--primary); text-decoration: none; font-weight: 600;">Join as Service
                        Provider</a></p>
            </div>
        </div>
    </main>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginForm.querySelector('input[type="email"]').value;
            const password = loginForm.querySelector('input[type="password"]').value;

            try {
                const res = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'user', email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', data.user.name);
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Login Failed: ' + data.error);
                }
            } catch (err) { alert('Error: ' + err.message + '\n\nMake sure you are accessing the page through http://localhost:3000 and NOT by double-clicking the HTML file!'); }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = registerForm.querySelector('input[type="text"]').value;
            const email = registerForm.querySelector('input[type="email"]').value;
            const passwords = registerForm.querySelectorAll('input[type="password"]');

            if (passwords[0].value !== passwords[1].value) {
                return alert('Passwords do not match! Please check your typing.');
            }

            try {
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'user', name, email, password: passwords[0].value })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', name);
                    alert('Registration Successful!');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Registration Failed: ' + data.error);
                }
            } catch (err) { alert('Error: ' + err.message + '\n\nMake sure you are accessing the page through http://localhost:3000 and NOT by double-clicking the HTML file!'); }
        });
    </script>
</body>

</html>
